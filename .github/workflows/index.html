<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratoire ADS - Benchmark Complet & Live FPS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stats.js/16/Stats.min.js"></script>
    <style>
        /* Le fond complexe et ANIMÉ */
        body {
            margin: 0; min-height: 100vh;
            background-color: #111; 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 0, 122, 0.8), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 225, 255, 0.8), transparent 25%),
                radial-gradient(circle at 50% 80%, rgba(122, 0, 255, 0.8), transparent 25%);
            background-size: 200% 200%; /* Nécessaire pour l'animation */
            animation: moveBlobs 10s ease-in-out infinite alternate;
            font-family: system-ui, sans-serif; padding-top: 100px;
        }

        /* Animation de l'arrière-plan */
        @keyframes moveBlobs {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        #controls {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.9); color: white;
            padding: 15px; z-index: 1000; display: flex; gap: 10px; flex-wrap: wrap;
            align-items: center; justify-content: center;
        }

        button { padding: 10px 15px; border: none; border-radius: 6px; background: #333; color: white; cursor: pointer; font-weight: bold;}
        button.active { background: #00e1ff; color: black; }
        .btn-run { background: #ff007a; font-size: 16px; border: 2px solid white;}

        #card-container { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; justify-content: center; }

        .card { width: 100px; height: 140px; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; }
        
        /* Les 4 états testés */
        .glass-standard { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37); }
        .glass-optimized { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); will-change: transform; transform: translateZ(0); border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37);}
        .glass-fallback { background: rgba(255, 255, 255, 0.9); color: black; backdrop-filter: none; -webkit-backdrop-filter: none; border: 1px solid rgba(0,0,0,0.1); }
        .glass-illusion { background-image: url('fond-flou2.webp'); background-size: cover; background-position: center; background-attachment: fixed; border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }

        #chart-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 800px; background: white; padding: 20px; border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5); z-index: 2000;
        }
        #status-text { margin-left: 15px; font-style: italic; color: #00e1ff;}
    </style>
</head>
<body>

    <div id="controls">
        <button id="btn-standard" class="active" onclick="setMode('glass-standard', this)">1. Standard</button>
        <button id="btn-optimized" onclick="setMode('glass-optimized', this)">2. Opti GPU</button>
        <button id="btn-fallback" onclick="setMode('glass-fallback', this)">3. Fallback</button>
        <button id="btn-illusion" onclick="setMode('glass-illusion', this)">4. Illusion</button>
        <button class="btn-run" onclick="runAutomatedBenchmark()">🚀 Lancer Benchmark</button>
        <span id="status-text">Prêt pour le test.</span>
    </div>

    <div id="card-container"></div>

    <div id="chart-modal">
        <h2 style="color: black; margin-top: 0;">Résultats du Benchmark</h2>
        <canvas id="resultsChart"></canvas>
        <button style="margin-top: 15px; background: black; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;" onclick="document.getElementById('chart-modal').style.display='none'">Fermer</button>
    </div>

    <script>
        // --- INITIALISATION DU COMPTEUR FPS EN TEMPS RÉEL (Stats.js) ---
        var stats = new Stats();
        stats.showPanel(0); // Affiche uniquement les FPS (0)
        document.body.appendChild(stats.dom);
        // On le place en haut à droite pour ne pas cacher tes boutons
        stats.dom.style.cssText = 'position:fixed;top:80px;right:15px;cursor:pointer;opacity:0.9;z-index:10000;transform:scale(1.5);transform-origin:top right;';

        // Boucle d'animation pour mettre à jour le compteur visuel en continu
        function animateStats() {
            stats.begin();
            stats.end();
            requestAnimationFrame(animateStats);
        }
        requestAnimationFrame(animateStats);
        // ---------------------------------------------------------------


        const container = document.getElementById('card-container');
        const statusText = document.getElementById('status-text');
        let currentClass = 'glass-standard';

        function setMode(className, buttonElement) {
            currentClass = className;
            document.querySelectorAll('#controls button:not(.btn-run)').forEach(btn => btn.classList.remove('active'));
            if(buttonElement) buttonElement.classList.add('active');
            document.querySelectorAll('.card').forEach(card => card.className = `card ${currentClass}`);
        }

        function setCards(amount) {
            container.innerHTML = '';
            for(let i = 0; i < amount; i++) {
                const card = document.createElement('div');
                card.className = `card ${currentClass}`;
                card.innerText = i + 1;
                container.appendChild(card);
            }
        }

        // Fonction de mesure mathématique pour le graphique
        function measureFPS() {
            return new Promise(resolve => {
                let frames = 0;
                let startTime = performance.now();
                function loop() {
                    frames++;
                    if (performance.now() - startTime < 1000) { requestAnimationFrame(loop); } 
                    else { resolve(frames); }
                }
                requestAnimationFrame(loop);
            });
        }

        async function runAutomatedBenchmark() {
            const steps = [10, 20, 30, 40, 50, 60, 70, 80];
            const results = { standard: [], optimized: [], fallback: [], illusion: [] };

            const modes = [
                { id: 'glass-standard', name: 'Standard', array: results.standard },
                { id: 'glass-optimized', name: 'Opti GPU', array: results.optimized },
                { id: 'glass-fallback', name: 'Fallback', array: results.fallback },
                { id: 'glass-illusion', name: 'Illusion', array: results.illusion }
            ];

            for (let mode of modes) {
                setMode(mode.id);
                for (let amount of steps) {
                    statusText.innerText = `Test en cours : ${mode.name} (${amount} cartes)...`;
                    setCards(amount);
                    await new Promise(r => setTimeout(r, 500)); 
                    const fps = await measureFPS();
                    mode.array.push(fps);
                }
            }

            statusText.innerText = "Benchmark terminé !";
            setCards(0);
            drawChart(steps, results);
        }

        let myChart = null;
        function drawChart(labels, data) {
            document.getElementById('chart-modal').style.display = 'block';
            const ctx = document.getElementById('resultsChart').getContext('2d');
            if(myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '1. Flou Standard', data: data.standard, borderColor: '#ff007a', tension: 0.3, fill: false },
                        { label: '2. Flou Opti GPU', data: data.optimized, borderColor: '#7a00ff', tension: 0.3, fill: false },
                        { label: '3. Sans Flou (Fallback)', data: data.fallback, borderColor: '#333333', tension: 0.3, fill: false },
                        { label: '4. Illusion d\'optique', data: data.illusion, borderColor: '#00e1ff', tension: 0.3, fill: false }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, max: 160, title: { display: true, text: 'FPS (Fluidité)' } },
                        x: { title: { display: true, text: 'Nombre de cartes affichées' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
